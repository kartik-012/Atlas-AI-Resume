<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#132337"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FC0D0"/>
      <stop offset="100%" stop-color="#1B6B93"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Compass outer ring -->
  <circle cx="32" cy="32" r="20" stroke="url(#ring)" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Compass cardinal ticks -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#4FC0D0" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="52" stroke="#4FC0D0" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#4FC0D0" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="52" y2="32" stroke="#4FC0D0" stroke-width="2" stroke-linecap="round"/>
  <!-- Compass needle north (teal) -->
  <polygon points="32,16 28,34 32,31 36,34" fill="#4FC0D0"/>
  <!-- Compass needle south (dim) -->
  <polygon points="32,48 28,34 32,37 36,34" fill="#1B6B93" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="2.5" fill="white"/>
</svg>
